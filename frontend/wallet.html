<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | Hostra</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: var(--bg-cream);">
    <header class="dashboard-header">
        <div class="container">
            <a href="index.html" class="logo">Hostra.</a>
            <div class="header-actions" id="dynamicNav">
                <!-- Filled by JS -->
            </div>
        </div>
    </header>

    <main class="container dashboard-content" style="padding-top: 40px; gap: 40px; max-width: 800px; margin: 0 auto;">
        <div style="text-align: center; margin-bottom: 2rem;" class="reveal-item">
            <h2 style="font-family: 'Clash Display', sans-serif; color: var(--text-heavy); font-size: 2.5rem; margin-bottom: 0.5rem;">My Wallet</h2>
            <p id="walletDescription" style="color: #4B5563; font-size: 1.1rem; margin-top: 0;">Earnings from verifying properties in your area.</p>
        </div>
        
        <div class="bento-card reveal-item" style="padding: 3rem; text-align: center; background: linear-gradient(135deg, var(--primary-blue), #2563EB); color: white;">
            <h3 style="margin-bottom: 0.5rem; font-weight: 500; font-family: 'Clash Display', sans-serif; font-size: 1.5rem;">Total Balance</h3>
            <div style="font-size: 3.5rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem;">
                <span style="font-size: 2rem;">₦</span><span class="count-up" id="balanceAmount" data-count="0">0</span>
            </div>
            <div style="display: inline-block;">
                <button id="btnWithdraw" class="btn btn-yellow" style="width: 100%; min-width: 250px;">Withdraw (Demo)</button>
                <p style="font-size: 0.85rem; margin-top: 0.5rem; margin-bottom: 0;">Demo, no real money moves</p>
            </div>
        </div>

        <div class="bento-card reveal-item" style="padding: 2rem;">
            <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'Clash Display', sans-serif; color: var(--text-heavy); font-size: 1.5rem;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-blue)" stroke-width="2"><polyline points="12 8 12 12 14 14"></polyline><circle cx="12" cy="12" r="10"></circle></svg>
                Earning History
            </h3>
            
            <div id="loadingMsg" style="text-align: center; padding: 2rem; color: #6B7280;">Loading history...</div>
            <div id="emptyMsg" style="text-align: center; padding: 3rem; color: #6B7280; display: none;">
                <p style="margin-bottom: 1rem;">No transactions yet.</p>
            </div>
            
            <div id="earningsList" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Filled by JS -->
            </div>
        </div>
    </main>

    <script src="js/animations.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!session.isAuthenticated()) {
                window.location.href = 'index.html';
                return;
            }
            
            const role = session.getRole();
            const nav = document.getElementById('dynamicNav');
            
            if (role === 'landlord') {
                document.getElementById('walletDescription').textContent = 'Earnings from rent payments.';
                nav.innerHTML = `
                    <a href="landlord.html" class="btn-text" style="color: var(--campus-blue);">Post Listing</a>
                    <a href="wallet.html" class="btn-text" style="color: var(--primary-blue);">Wallet</a>
                    <a href="profile.html" class="btn-text" title="Profile"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></a>
                    <button id="logoutBtn" class="btn btn-blue-outline">Log Out</button>
                `;
            } else {
                nav.innerHTML = `
                    <a href="student-dashboard.html" class="btn-text">Feed</a>
                    <a href="verifier.html" class="btn-text">Verify</a>
                    <a href="roommate.html" class="btn-text">Roommates</a>
                    <a href="wallet.html" class="btn-text" style="color: var(--primary-blue);">Wallet</a>
                    <a href="profile.html" class="btn-text" title="Profile"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></a>
                    <button id="logoutBtn" class="btn btn-blue-outline">Log Out</button>
                `;
            }

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                try { await api.logout(); } catch(err) {}
                session.clear();
                window.location.href = 'index.html';
            });
            
            loadWallet();
        });

        async function loadWallet() {
            try {
                const data = await api.getWallet();
                document.getElementById('loadingMsg').style.display = 'none';
                
                const balanceAmountEl = document.getElementById('balanceAmount');
                balanceAmountEl.setAttribute('data-count', data.wallet_balance || 0);
                // Trigger count-up manually if animations.js missed it
                balanceAmountEl.textContent = (data.wallet_balance || 0).toLocaleString();
                
                const list = document.getElementById('earningsList');
                list.innerHTML = '';
                if (!data.earnings || data.earnings.length === 0) {
                    document.getElementById('emptyMsg').style.display = 'block';
                    return;
                }

                data.earnings.forEach((e, i) => {
                    const el = document.createElement('div');
                    el.className = 'reveal-item';
                    el.style.transitionDelay = `${i * 0.1}s`;
                    el.style.display = 'flex';
                    el.style.justifyContent = 'space-between';
                    el.style.alignItems = 'center';
                    el.style.padding = '1.5rem';
                    el.style.background = 'white'; // Inside bento card
                    el.style.borderRadius = '12px';
                    el.style.border = '1px solid #E5E7EB';
                    
                    const date = new Date(e.timestamp).toLocaleDateString(undefined, {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });

                    const isWithdrawal = e.type === 'withdrawal';
                    const color = isWithdrawal ? '#6B7280' : 'var(--verified-green)';
                    const prefix = isWithdrawal ? '' : '+';
                    const title = isWithdrawal ? 'Withdrawal' : (session.getRole() === 'landlord' ? 'Rent Payment' : 'Verified Property');

                    el.innerHTML = `
                        <div>
                            <div style="font-weight: 600; margin-bottom: 0.25rem; font-family: 'Inter', sans-serif; color: var(--text-heavy);">${title}</div>
                            <div style="color: #6B7280; font-size: 0.9rem; font-family: 'Inter', sans-serif;">${e.listing_address} • ${date}</div>
                        </div>
                        <div style="font-size: 1.25rem; font-weight: 700; font-family: 'Outfit', sans-serif; color: ${color};">
                            ${prefix}₦${e.amount.toLocaleString()}
                        </div>
                    `;
                    list.appendChild(el);
                    
                    // Trigger fade up animation for dynamic elements
                    setTimeout(() => {
                        el.classList.add('reveal-visible');
                    }, 50);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('loadingMsg').textContent = 'Failed to load wallet data.';
                document.getElementById('loadingMsg').style.color = 'red';
            }
        }

        document.getElementById('btnWithdraw')?.addEventListener('click', async () => {
            const amountStr = prompt("Enter amount to withdraw (Demo):");
            if (!amountStr) return;
            const amount = parseInt(amountStr);
            if (isNaN(amount) || amount <= 0) {
                alert("Please enter a valid positive amount.");
                return;
            }

            try {
                document.getElementById('btnWithdraw').disabled = true;
                document.getElementById('btnWithdraw').innerText = 'Processing...';
                await api.withdrawWallet(amount);
                alert("Demo withdrawal successful!");
                await loadWallet();
            } catch(e) {
                alert(e.message);
            } finally {
                document.getElementById('btnWithdraw').disabled = false;
                document.getElementById('btnWithdraw').innerText = 'Withdraw (Demo)';
            }
        });
    </script>
</body>
</html>

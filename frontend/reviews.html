<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Reviews - Hostra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .sentiment-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .sentiment-positive { background-color: rgba(16, 185, 129, 0.1); color: var(--verified-green); }
        .sentiment-negative { background-color: rgba(239, 68, 68, 0.1); color: #EF4444; }
        .sentiment-neutral { background-color: rgba(245, 158, 11, 0.1); color: #F59E0B; }
        
        .review-text {
            color: #4A5568;
            font-size: 1rem;
            line-height: 1.6;
            font-style: italic;
            margin: 1rem 0;
        }
        .review-summary {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-heavy);
        }
        .date-stamp {
            font-size: 0.85rem;
            color: #A0AEC0;
        }
        .btn-record {
            background-color: #EF4444;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-record.recording {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <div class="container">
            <a href="index.html" class="logo">Hostra.</a>
            <div class="header-actions">
                <a href="student-dashboard.html" class="btn-text">Dashboard</a>
                <button id="logoutBtn" class="btn btn-blue-outline">Log Out</button>
            </div>
        </div>
    </header>

    <main class="container dashboard-content" style="padding-top: 40px; gap: 40px;">
        <div style="text-align: center;">
            <h2>Property Reviews</h2>
            <p>Listen to what other students have to say</p>
        </div>

        <div class="bento-card" id="overall-summary-block">
            <h3>Overall Sentiment</h3>
            <p id="overall-text" style="color: var(--text-heavy); font-weight: 500; font-size: 1.25rem;">Loading overall summary...</p>
        </div>

        <div class="bento-card">
            <h3>Leave a Review</h3>
            <p>Type your review or use your voice to record it.</p>
            <div class="form-group">
                <textarea id="review-text" placeholder="I loved living here..." style="min-height: 120px; width: 100%;"></textarea>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn-record" id="btn-record">🎤 Record Voice Note</button>
                <button class="btn btn-yellow" id="btn-submit">Submit Review</button>
            </div>
            <p id="record-status" style="margin-top: 1rem; font-weight: 600;"></p>
        </div>

        <div>
            <h3 style="margin-bottom: 2rem;">Past Reviews</h3>
            <div id="reviews-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div style="color: #6B7280;">Loading reviews...</div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        if (!session.isAuthenticated() || session.getRole() !== 'student') {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await api.logout(); } catch (err) {}
            session.clear();
            window.location.href = 'index.html';
        });

        const urlParams = new URLSearchParams(window.location.search);
        const listingId = urlParams.get('listing_id') || 1;

        const overallText = document.getElementById('overall-text');
        const reviewsList = document.getElementById('reviews-list');
        const btnRecord = document.getElementById('btn-record');
        const btnSubmit = document.getElementById('btn-submit');
        const reviewTextArea = document.getElementById('review-text');
        const recordStatus = document.getElementById('record-status');

        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = function() {
                isRecording = true;
                btnRecord.classList.add('recording');
                btnRecord.innerText = '⏹ Stop Recording';
                recordStatus.innerText = 'Listening...';
                recordStatus.style.color = '#F59E0B';
            };

            recognition.onresult = function(event) {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    const currentVal = reviewTextArea.value;
                    reviewTextArea.value = currentVal ? currentVal + ' ' + finalTranscript : finalTranscript;
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error', event.error);
                recordStatus.innerText = 'Error recognizing speech: ' + event.error;
                recordStatus.style.color = '#EF4444';
                stopRecording();
            };

            recognition.onend = function() {
                stopRecording();
            };
        } else {
            btnRecord.style.display = 'none';
            recordStatus.innerText = 'Voice recording not supported in this browser.';
            recordStatus.style.color = '#EF4444';
        }

        function toggleRecording() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function stopRecording() {
            isRecording = false;
            btnRecord.classList.remove('recording');
            btnRecord.innerText = '🎤 Record Voice Note';
            if (recordStatus.innerText === 'Listening...') {
                recordStatus.innerText = 'Recording stopped.';
                recordStatus.style.color = '#6B7280';
            }
        }

        btnRecord.addEventListener('click', toggleRecording);

        async function loadReviews() {
            try {
                const data = await api.getReviews(listingId);
                overallText.innerText = data.overall_summary;
                
                reviewsList.innerHTML = '';
                if (!data.reviews || data.reviews.length === 0) {
                    reviewsList.innerHTML = '<p style="color: #6B7280">No reviews yet.</p>';
                    return;
                }

                data.reviews.forEach(review => {
                    const card = document.createElement('div');
                    card.className = 'bento-card';
                    card.style.padding = '1.5rem';
                    
                    let sentimentClass = 'sentiment-neutral';
                    if (review.sentiment && review.sentiment.toLowerCase() === 'positive') sentimentClass = 'sentiment-positive';
                    if (review.sentiment && review.sentiment.toLowerCase() === 'negative') sentimentClass = 'sentiment-negative';

                    card.innerHTML = `
                        <span class="sentiment-badge ${sentimentClass}">${review.sentiment || 'neutral'}</span>
                        <div class="review-summary">${review.gemma_summary || 'No summary available'}</div>
                        <div class="review-text">"${review.transcribed_text}"</div>
                        <span class="date-stamp">${new Date(review.timestamp).toLocaleDateString()}</span>
                    `;
                    reviewsList.appendChild(card);
                });
            } catch (e) {
                overallText.innerText = 'Failed to load overall summary.';
                reviewsList.innerHTML = '<p style="color: #EF4444">Failed to load reviews.</p>';
                console.error(e);
            }
        }

        btnSubmit.addEventListener('click', async () => {
            const text = reviewTextArea.value.trim();
            if (!text) {
                alert('Please enter a review or record a voice note.');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerText = 'Submitting...';

            try {
                await api.submitReview(listingId, text);

                reviewTextArea.value = '';
                recordStatus.innerText = 'Review submitted successfully!';
                recordStatus.style.color = 'var(--verified-green)';
                setTimeout(() => recordStatus.innerText = '', 3000);
                
                loadReviews();
            } catch (e) {
                alert(e.message);
                console.error(e);
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = 'Submit Review';
            }
        });

        loadReviews();
    </script>
</body>
</html>

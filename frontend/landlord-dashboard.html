<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landlord Dashboard | Hostra</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .listing-card {
            background: var(--card-surface);
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(17,24,39,0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #E5E7EB;
        }
        .listing-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #E5E7EB;
        }
        .listing-content {
            padding: 1.5rem;
            flex: 1;
        }
        .listing-price {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.25rem;
        }
        .listing-address {
            color: #4B5563;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .listing-claims {
            font-size: 0.9rem;
            color: #6B7280;
            margin-bottom: 1rem;
            border-top: 1px solid #E5E7EB;
            padding-top: 1rem;
        }
        .badge-pending {
            display: inline-block;
            background: #F3F4F6;
            color: #4B5563;
            padding: 4px 12px;
            border-radius: 99px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .maintenance-block {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="container">
            <a href="index.html" class="logo">Hostra</a>
            <div class="header-actions">
                <a href="landlord.html" class="btn-text" style="color: var(--campus-blue);">Post Listing</a>
                <a href="wallet.html" class="btn-text">Wallet</a>
                <a href="profile.html" class="btn-text" title="Profile"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></a>
                <button id="logoutBtn" class="btn btn-blue-outline">Log Out</button>
            </div>
                        <div class="notification-container">
                <button id="notificationBell" class="notification-bell-btn">
                    🔔 <span id="notificationBadge" class="notification-badge">0</span>
                </button>
                
                <!-- The hidden dropdown box that slides open -->
                <div id="notificationDropdown" class="notification-dropdown" style="display: none;">
                    <div class="dropdown-header">
                        <h4>Notifications</h4>
                    </div>
                    <div id="notificationList" class="dropdown-list">
                        <p class="no-notes">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container dashboard-content" style="padding-top: 40px; gap: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h2>Landlord Portal</h2>
                <p id="welcomeMsg" style="margin: 0;">Loading...</p>
            </div>
            <a href="landlord.html" class="btn btn-yellow">Add New Property</a>
        </div>
        
        <div class="bento-card" style="padding: 2.5rem;">
            <h3 style="margin-bottom: 1.5rem;">Your Properties & Maintenance</h3>
            
            <div id="loadingMsg">Fetching listings...</div>
            <div id="emptyMsg" style="display: none; color: #6B7280;">You have not posted any properties yet. Click 'Add New Property' to start.</div>
            
            <div class="listing-grid" id="listingsContainer">
                <!-- Listings will be injected here -->
            </div>
        </div>
    </main>

    <script src="js/animations.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard-ui.js"></script>
    <script>
        if (!session.isAuthenticated() || session.getRole() !== 'landlord') {
            window.location.href = 'login.html';
        } else {
            const email = session.getEmail();
            document.getElementById('welcomeMsg').textContent = `Welcome back, ${email}`;
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const btn = document.getElementById('logoutBtn');
            btn.textContent = 'Logging out...';
            btn.disabled = true;
            try { await api.logout(); } catch (err) {}
            session.clear();
            window.location.href = 'index.html';
        });

        // Demo logic for handling repair uploads
        async function submitRepairAudit(listingId, fileInputId, btnElement) {
            const fileInput = document.getElementById(fileInputId);
            if (!fileInput.files.length) {
                alert("Please select a photo of the completed repair.");
                return;
            }

            btnElement.disabled = true;
            btnElement.innerText = "Running AI Audit...";

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                // We call the API endpoint we added in api.js
                await api.submitRepairAudit(listingId, formData);
                alert("AI verified the repair! Maintenance funds have been released to the plumber.");
                btnElement.innerText = "Resolved ✅";
                btnElement.style.backgroundColor = "var(--verified-green)";
                btnElement.style.color = "white";
                btnElement.style.borderColor = "var(--verified-green)";
            } catch (err) {
                alert("AI could not verify the repair. Please upload a clearer photo.");
                btnElement.disabled = false;
                btnElement.innerText = "Submit Plumber Photo";
            }
        }

        async function loadListings() {
            const container = document.getElementById('listingsContainer');
            const loading = document.getElementById('loadingMsg');
            const empty = document.getElementById('emptyMsg');

            try {
                const data = await api.getListings(true);
                loading.style.display = 'none';
                
                const myProperties = data.listings;

                if (!myProperties || myProperties.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                myProperties.forEach((listing, index) => {
                    const card = document.createElement('div');
                    card.className = 'listing-card reveal-item';
                    card.style.transitionDelay = `${index * 0.08}s`;
                    const imageUrl = `${API_BASE_URL}${listing.image_path}`;

                    // Demo mock: For hackathon purposes, we randomly show a maintenance request on verified properties to demonstrate the feature
                    let maintenanceHtml = '';
                    if (listing.status === 'verified' && Math.random() > 0.5) {
                        const fileInputId = `repair_file_${listing.id}`;
                        maintenanceHtml = `
                            <div class="maintenance-block">
                                <strong style="color: #B91C1C;">⚠️ Maintenance Request</strong>
                                <p style="font-size: 0.85rem; margin: 0.5rem 0;">Tenant reported a broken pipe. Dispatch a plumber and upload the fixed photo for AI audit.</p>
                                <input type="file" id="${fileInputId}" accept="image/*" style="width: 100%; margin-bottom: 0.5rem; font-size: 0.8rem;">
                                <button class="btn btn-blue-outline" style="width: 100%; padding: 0.5rem; font-size: 0.85rem;" onclick="submitRepairAudit(${listing.id}, '${fileInputId}', this)">Submit Plumber Photo</button>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <img src="${imageUrl}" alt="Property" class="listing-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNFMkU4RjAiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZmlsbD0iIzY0NzQ4YiIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMTQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5JbWFnZSBOb3QgRm91bmQ8L3RleHQ+PC9zdmc+'">
                        <div class="listing-content">
                            <div class="listing-price">${listing.price}</div>
                            <div class="listing-address">${listing.address}</div>
                            <div class="listing-claims"><strong>Claims:</strong> ${listing.landlord_claims}</div>
                            ${listing.status === 'pending' 
                                ? '<span class="badge-pending">Pending Verification</span>' 
                                : '<div style="display: inline-flex; align-items: center; color: var(--verified-green); font-family: \'Outfit\', sans-serif; font-weight: 700;"><span class="verified-seal" style="margin-left: 0; margin-right: 8px;"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></span> Verified</div>'}
                            ${maintenanceHtml}
                        </div>
                    `;
                    container.appendChild(card);
                    if (window.revealObserver) {
                        card.classList.add('reveal-hidden');
                        window.revealObserver.observe(card);
                    }
                });

            } catch (error) {
                loading.textContent = 'Error loading properties. Ensure backend is running.';
                loading.style.color = 'red';
            }
        }

        loadListings();
    </script>
</body>
</html>
